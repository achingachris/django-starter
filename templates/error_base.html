{% extends "web/base.html" %}
{% load static %}
{% block body %}
<main class="min-h-[calc(100vh-12rem)] flex items-center justify-center px-6 py-20">
  <div class="max-w-4xl mx-auto grid lg:grid-cols-2 gap-12 lg:gap-20 items-center">
    <div class="order-2 lg:order-1 text-center lg:text-left">
      <span class="text-xs font-bold uppercase tracking-[0.2em] text-primary mb-4 block">Oops</span>
      <h1 class="font-serif text-5xl lg:text-7xl font-bold tracking-tight mb-6 leading-[1.05]">
        {% block error_heading %}{% translate "Something went wrong." %}{% endblock %}
      </h1>
      <div class="text-base-content/60 text-lg leading-relaxed space-y-4">
        {% block error_details %}{% endblock %}
      </div>
      <div class="mt-8">
        <a href="{% url 'web:home' %}" class="btn btn-primary rounded-full shadow-lg shadow-primary/20 hover:-translate-y-0.5 transition-all duration-300 px-8 font-semibold">
          Go home
        </a>
      </div>
    </div>
    <div class="order-1 lg:order-2 flex justify-center">
      <img src="{% static 'images/web/texture-abstract-1.jpg' %}" alt="" class="w-full max-w-md h-80 object-cover rounded-[2.5rem] shadow-2xl shadow-base-content/5 opacity-80 rotate-2 hover:rotate-0 transition-transform duration-700">
    </div>
  </div>
</main>
{% endblock%}
