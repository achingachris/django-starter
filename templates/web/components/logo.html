{% load static %}
{# Sokoni logo: gradient pin mark + wordmark. Pass `size` (h-* class) to control the mark height. #}
<span class="inline-flex items-center gap-2 select-none" aria-label="Sokoni">
  <svg class="{{ size|default:"h-9" }} w-auto" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
    <defs>
      <linearGradient id="sokoni-grad" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
        <stop stop-color="#e0705a"/>
        <stop offset="1" stop-color="#c9a96e"/>
      </linearGradient>
    </defs>
    <rect x="2" y="2" width="44" height="44" rx="13" fill="url(#sokoni-grad)"/>
    <path d="M24 9.5c-6.1 0-11 4.8-11 10.6 0 7.3 8.2 15.4 10.2 17.4a1.15 1.15 0 0 0 1.6 0c2-2 10.2-10.1 10.2-17.4 0-5.8-4.9-10.6-11-10.6z" fill="#fff"/>
    <circle cx="24" cy="20.2" r="4.4" fill="#F59E0B"/>
  </svg>
  {% if not hide_wordmark %}
  <span class="font-extrabold tracking-tight text-2xl text-base-content leading-none">
    Soko<span class="text-primary">ni</span>
  </span>
  {% endif %}
</span>
