{% load i18n %}
<div class="sticky top-0 z-50 bg-base-100/70 backdrop-blur-xl border-b border-base-300/60"
     x-data="{ mobileMenuOpen: false }">
  <nav class="mx-auto max-w-6xl px-6 lg:px-10">
    <div class="flex h-16 lg:h-20 items-center justify-between">
      <!-- Mobile menu button -->
      <div class="lg:hidden">
        <button @click="mobileMenuOpen = true" class="btn btn-ghost btn-sm -ml-2 text-base-content hover:text-primary transition-colors" aria-label="Menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
        </button>
      </div>

      <!-- Logo -->
      <a href="{% url 'web:home' %}" class="group flex items-center gap-2 hover:opacity-80 transition-opacity duration-300">
        {% include "web/components/logo.html" %}
      </a>

      <!-- Center links (desktop) -->
      <div class="hidden lg:flex items-center gap-8 absolute left-1/2 -translate-x-1/2">
        <a href="{% url 'web:home' %}" class="text-sm tracking-wide font-medium text-base-content/80 hover:text-base-content hover:text-primary transition-colors relative group">
          Home
          <span class="absolute -bottom-1 left-0 w-0 h-[1.5px] bg-primary transition-all duration-300 group-hover:w-full"></span>
        </a>
        <a href="{% url 'services:service_browse' %}" class="text-sm tracking-wide font-medium text-base-content/80 hover:text-base-content hover:text-primary transition-colors relative group">
          Services
          <span class="absolute -bottom-1 left-0 w-0 h-[1.5px] bg-primary transition-all duration-300 group-hover:w-full"></span>
        </a>
      </div>

      <!-- Right actions -->
      <div class="flex items-center gap-3">
        <button id="theme-toggle" type="button" class="btn btn-ghost btn-circle btn-sm text-base-content/60 hover:text-base-content hover:bg-base-200/60" aria-label="Toggle theme" title="Toggle theme">
          <i data-theme-icon="moon" class="fa fa-moon text-sm"></i>
          <i data-theme-icon="sun" class="fa fa-sun hidden text-sm"></i>
        </button>

        {% if user.is_authenticated %}
          <a href="{% url 'services:provider_dashboard' %}" class="hidden sm:inline-flex btn btn-outline btn-sm rounded-full border-base-300 text-base-content hover:border-primary hover:text-primary transition-all">
            <i class="fa fa-user-circle mr-1.5 text-xs"></i>
            <span class="text-xs font-medium">Dashboard</span>
          </a>
        {% else %}
          <a href="{% url 'account_login' %}" class="hidden sm:inline-flex btn btn-ghost btn-sm rounded-full text-base-content hover:text-primary transition-colors text-xs font-medium">
            Sign In
          </a>
          <a href="{% url 'account_signup' %}" class="btn btn-primary btn-sm rounded-full shadow-lg shadow-primary/20 hover:shadow-primary/30 hover:-translate-y-0.5 transition-all duration-300 text-xs font-semibold px-4">
            Sign Up
          </a>
        {% endif %}
      </div>
    </div>
  </nav>

  <!-- Mobile drawer -->
  <template x-teleport="body">
    <div x-show="mobileMenuOpen" x-cloak class="fixed inset-0 z-[60] lg:hidden">
      <div x-show="mobileMenuOpen"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0"
           x-transition:enter-end="opacity-100"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100"
           x-transition:leave-end="opacity-0"
           @click="mobileMenuOpen = false"
           class="fixed inset-0 bg-neutral/20 backdrop-blur-sm"></div>
      <aside x-show="mobileMenuOpen"
           x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="-translate-x-full"
           x-transition:enter-end="translate-x-0"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="translate-x-0"
           x-transition:leave-end="-translate-x-full"
           class="fixed inset-y-0 left-0 w-[300px] bg-base-100 shadow-2xl overflow-y-auto p-6">
        <div class="flex items-center justify-between mb-8">
          {% include "web/components/logo.html" %}
          <button @click="mobileMenuOpen = false" class="btn btn-ghost btn-sm" aria-label="Close menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <nav class="flex flex-col gap-1">
          <a href="{% url 'web:home' %}" class="px-3 py-3 rounded-xl text-base font-medium text-base-content hover:bg-base-200 hover:text-primary transition-all">Home</a>
          <a href="{% url 'services:service_browse' %}" class="px-3 py-3 rounded-xl text-base font-medium text-base-content hover:bg-base-200 hover:text-primary transition-all">Services</a>
          {% if user.is_authenticated %}
            <a href="{% url 'services:provider_dashboard' %}" class="px-3 py-3 rounded-xl text-base font-medium text-base-content hover:bg-base-200 hover:text-primary transition-all">Dashboard</a>
          {% else %}
            <a href="{% url 'account_signup' %}" class="mt-4 btn btn-primary rounded-full w-full">Get Started</a>
          {% endif %}
        </nav>
      </aside>
    </div>
  </template>
</div>
