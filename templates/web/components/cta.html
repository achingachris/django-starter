{% load i18n %}
<section class="mx-auto max-w-6xl px-6 lg:px-10 py-16 lg:py-24">
  <div class="relative overflow-hidden rounded-[2.5rem] bg-gradient-to-br from-neutral via-[#25252a] to-[#2a1f1e] shadow-2xl shadow-neutral/20">
    <!-- Abstract texture overlay -->
    <div class="absolute inset-0 opacity-[0.08]" style="background-image: url('/static/images/web/texture-abstract-2.jpg'); background-size: cover; background-position: center; mix-blend-mode: overlay;"></div>

    <div class="relative z-10 px-8 lg:px-16 py-14 lg:py-20 text-center lg:text-left flex flex-col lg:flex-row items-center justify-between gap-10">
      <div class="max-w-xl">
        <h2 class="font-serif text-3xl lg:text-5xl font-bold text-base-content tracking-tight mb-4 leading-[1.1]">
          Ready to <span class="text-brand-gradient italic font-normal">get booked?</span>
        </h2>
        <p class="text-base-content/60 text-base lg:text-lg leading-relaxed">
          Join Sokoni today and start connecting with clients who value quality, reliability, and real craft.
        </p>
      </div>
      <a href="{% url 'account_signup' %}" class="btn btn-primary btn-lg rounded-full shadow-xl shadow-primary/30 hover:shadow-primary/50 hover:-translate-y-1 transition-all duration-300 px-10 font-semibold tracking-tight text-base whitespace-nowrap">
        Get started free
      </a>
    </div>
  </div>
</section>
